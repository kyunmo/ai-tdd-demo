<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${notice.title}">공지사항 상세</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .header { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header a { text-decoration: none; color: #333; font-size: 24px; font-weight: bold; }
        .nav ul { list-style: none; padding: 0; margin: 0; display: flex; }
        .nav li { margin-left: 15px; }
        .nav a { text-decoration: none; color: #007bff; padding: 5px 10px; border: 1px solid #007bff; border-radius: 5px; }
        .nav a.active { background-color: #007bff; color: white; }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        .card { border: 1px solid #ddd; border-radius: 5px; background-color: white; margin-top: 20px; margin-bottom: 20px; }
        .card-header { padding: 15px; border-bottom: 1px solid #eee; background-color: #f9f9f9; }
        .card-header h1 { margin: 0; font-size: 24px; color: #333; }
        .card-header h6 { margin-top: 5px; color: #6c757d; font-size: 14px; }
        .card-body { padding: 15px; }
        .card-body p { white-space: pre-wrap; line-height: 1.6; color: #555; }
        .card-footer { padding: 15px; text-align: center; border-top: 1px solid #eee; background-color: #f9f9f9; }
        .button { display: inline-block; padding: 10px 20px; text-decoration: none; color: white; background-color: #007bff; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <a href="/">AI TDD 데모</a>
        <nav class="nav">
            <ul>
                <li><a href="/">홈</a></li>
                <li><a href="/users">사용자 목록</a></li>
                <li><a href="/notices" class="active">공지사항</a></li>
            </ul>
        </nav>
    </header>

    <div class="card">
        <div class="card-header">
            <h1 th:text="${notice.title}">공지사항 제목</h1>
            <h6 th:text="${'작성자: ' + notice.author + ' | 작성일: ' + #temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">작성자 정보</h6>
        </div>
        <div class="card-body">
            <p style="white-space: pre-wrap;" th:text="${notice.content}">공지사항 내용입니다.</p>
        </div>
        <div class="card-footer">
            <a href="/notices" class="button">목록으로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
